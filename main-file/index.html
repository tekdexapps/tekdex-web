<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <meta name="description" content="Tekdex Inc is refreshing its online presence. We'll be back shortly.">
   <title>TekDex — Coming Soon</title>
   <link rel="shortcut icon" href="assets/img/favicon.svg">
   <link rel="preconnect" href="https://fonts.googleapis.com">
   <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
   <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
   <style>
      *, *::before, *::after {
         box-sizing: border-box;
         margin: 0;
         padding: 0;
      }

      :root {
         --bg: #08080d;
         --surface: rgba(255, 255, 255, 0.04);
         --border: rgba(255, 255, 255, 0.08);
         --text: #f0f0f5;
         --text-muted: #8b8b9e;
         --accent: #dd5907;
         --accent-light: #ef8145;
         --glow: rgba(221, 89, 7, 0.35);
      }

      html {
         font-size: 16px;
         -webkit-font-smoothing: antialiased;
      }

      body {
         font-family: 'Inter', system-ui, -apple-system, sans-serif;
         background: var(--bg);
         color: var(--text);
         min-height: 100dvh;
         overflow-x: hidden;
         line-height: 1.6;
      }

      .bg {
         position: fixed;
         inset: 0;
         z-index: 0;
         overflow: hidden;
         pointer-events: none;
      }

      .bg__gradient {
         position: absolute;
         inset: 0;
         background:
            radial-gradient(ellipse 80% 60% at 50% -10%, rgba(221, 89, 7, 0.18) 0%, transparent 60%),
            radial-gradient(ellipse 50% 40% at 100% 80%, rgba(239, 129, 69, 0.1) 0%, transparent 50%),
            radial-gradient(ellipse 40% 30% at 0% 60%, rgba(221, 89, 7, 0.08) 0%, transparent 50%);
      }

      .bg__grid {
         position: absolute;
         inset: 0;
         background-image:
            linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
            linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
         background-size: 64px 64px;
         mask-image: radial-gradient(ellipse 70% 70% at 50% 40%, black 20%, transparent 80%);
      }

      .bg__orb {
         position: absolute;
         border-radius: 50%;
         filter: blur(80px);
         animation: float 12s ease-in-out infinite;
      }

      .bg__orb--1 {
         width: 420px;
         height: 420px;
         background: rgba(221, 89, 7, 0.15);
         top: -10%;
         right: -8%;
      }

      .bg__orb--2 {
         width: 300px;
         height: 300px;
         background: rgba(239, 129, 69, 0.1);
         bottom: 10%;
         left: -5%;
         animation-delay: -4s;
      }

      @keyframes float {
         0%, 100% { transform: translate(0, 0) scale(1); }
         33% { transform: translate(20px, -30px) scale(1.05); }
         66% { transform: translate(-15px, 20px) scale(0.95); }
      }

      .page {
         position: relative;
         z-index: 1;
         min-height: 100dvh;
         display: flex;
         flex-direction: column;
         align-items: center;
         justify-content: center;
         padding: 2rem 1.25rem 1.5rem;
      }

      .badge {
         position: fixed;
         top: 1.25rem;
         right: 1.25rem;
         z-index: 2;
         display: inline-flex;
         align-items: center;
         gap: 0.5rem;
         padding: 0.4rem 1rem;
         border-radius: 100px;
         background: var(--surface);
         border: 1px solid var(--border);
         backdrop-filter: blur(12px);
         font-size: 0.75rem;
         font-weight: 600;
         letter-spacing: 0.08em;
         text-transform: uppercase;
         color: var(--accent-light);
         animation: fadeUp 0.8s ease 0.1s both;
      }

      .card {
         width: 100%;
         max-width: 640px;
         text-align: center;
         animation: fadeUp 0.8s ease both;
      }

      @keyframes fadeUp {
         from {
            opacity: 0;
            transform: translateY(24px);
         }
         to {
            opacity: 1;
            transform: translateY(0);
         }
      }

      .logo {
         display: block;
         width: fit-content;
         margin: 0 auto 2.5rem;
         animation: fadeUp 0.8s ease 0.15s both;
      }

      .logo img {
         width: clamp(200px, 52vw, 280px);
         height: auto;
         display: block;
         margin: 0 auto;
      }

      .badge__dot {
         width: 6px;
         height: 6px;
         border-radius: 50%;
         background: var(--accent);
         box-shadow: 0 0 8px var(--glow);
         animation: pulse 2s ease-in-out infinite;
      }

      @keyframes pulse {
         0%, 100% { opacity: 1; transform: scale(1); }
         50% { opacity: 0.6; transform: scale(0.85); }
      }

      h1 {
         font-size: clamp(2rem, 6vw, 3.25rem);
         font-weight: 700;
         line-height: 1.15;
         letter-spacing: -0.03em;
         margin-bottom: 1rem;
         animation: fadeUp 0.8s ease 0.3s both;
      }

      h1 span {
         background: linear-gradient(135deg, var(--accent-light), var(--accent));
         -webkit-background-clip: text;
         -webkit-text-fill-color: transparent;
         background-clip: text;
      }

      .subtitle {
         font-size: clamp(0.95rem, 2.5vw, 1.125rem);
         color: var(--text-muted);
         max-width: 480px;
         margin: 0 auto 2rem;
         animation: fadeUp 0.8s ease 0.4s both;
      }

      .contact {
         animation: fadeUp 0.8s ease 0.5s both;
      }

      .contact__text {
         font-size: 0.875rem;
         color: var(--text-muted);
      }

      .contact__link {
         color: var(--accent-light);
         text-decoration: none;
         font-weight: 500;
         transition: color 0.2s;
      }

      .contact__link:hover {
         color: var(--text);
      }

      .footer {
         margin-top: auto;
         padding-top: 3rem;
         font-size: 0.8rem;
         color: var(--text-muted);
         animation: fadeUp 0.8s ease 0.6s both;
      }

      @media (max-width: 480px) {
         .badge {
            top: 1rem;
            right: 1rem;
            font-size: 0.65rem;
            padding: 0.35rem 0.75rem;
         }
      }

      @media (max-width: 360px) {
         .page {
            padding: 1.5rem 1rem;
            padding-top: 3.5rem;
         }

         .logo {
            margin-bottom: 2rem;
         }

         .logo img {
            width: clamp(180px, 70vw, 240px);
         }
      }

      @media (prefers-reduced-motion: reduce) {
         *, *::before, *::after {
            animation-duration: 0.01ms !important;
            animation-iteration-count: 1 !important;
         }
      }
   </style>
</head>
<body>

   <div class="bg" aria-hidden="true">
      <div class="bg__gradient"></div>
      <div class="bg__grid"></div>
      <div class="bg__orb bg__orb--1"></div>
      <div class="bg__orb bg__orb--2"></div>
   </div>

   <div class="badge">
      <span class="badge__dot"></span>
      Launching Soon
   </div>

   <main class="page">
      <div class="card">
         <a href="#" class="logo" aria-label="TekDex">
            <img src="assets/img/logo.png" alt="TekDex">
         </a>

         <h1>We're building<br><span>something great</span></h1>

         <p class="subtitle">
            Tekdex Inc is refreshing its online presence.
            We appreciate your patience — we'll be back shortly.
         </p>

         <div class="contact">
            <p class="contact__text">
               For career and hiring inquiries, email
               <a class="contact__link" href="mailto:hr@tekdexinc.com">hr@tekdexinc.com</a>
            </p>
         </div>
      </div>

      <footer class="footer">
         &copy; <span id="year"></span> TekDex. All rights reserved.
      </footer>
   </main>

   <script>
      document.getElementById('year').textContent = new Date().getFullYear();
   </script>
</body>
</html>
